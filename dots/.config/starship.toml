"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
[](blue)\
$os\
$username\
$hostname\
[](bg:green fg:blue)\
$directory\
[](bg:yellow fg:green)\
$git_branch\
$git_status\
[ ](fg:yellow)\
$character"""

palette = 'tokyo_night'

[hostname]
ssh_only = false
style = "bg:blue fg:crust"
format = '[$hostname ]($style)'

[username]
disabled = false
show_always = true
style_user = "bg:blue fg:crust"
style_root = "bg:blue fg:crust"
format = '[ $user@]($style)'

[os]
disabled = false
style = "bg:blue fg:crust"

[os.symbols]
Windows = ""
Arch = "󰣇"
CachyOS = "󰣇"

[directory]
style = "bg:green fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:yellow fg:crust"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:yellow fg:crust"
format = '[($all_status$ahead_behind )]($style)'

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'

[palettes.tokyo_night]
rosewater = "#f7768e"
flamingo = "#ff7a93"
pink = "#ff7a93"
mauve = "#bb9af7"
red = "#f7768e"
maroon = "#ff7a93"
peach = "#ff9e64"
yellow = "#e0af68"
green = "#9ece6a"
teal = "#449dab"
sky = "#7dcfff"
sapphire = "#7dcfff"
blue = "#7aa2f7"
lavender = "#c0caf5"
text = "#c0caf5"
subtext1 = "#a9b1d6"
subtext0 = "#9aa5ce"
overlay2 = "#565f89"
overlay1 = "#3b4261"
overlay0 = "#2f3346"
surface2 = "#24283b"
surface1 = "#1e2030"
surface0 = "#1a1b26"
base = "#1a1b26"
mantle = "#16161e"
crust = "#0f0f14"
